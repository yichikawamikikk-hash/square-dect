<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">News | square（スクエア）</title>
  <meta name="description" content="square（スクエア）の導入事例・お知らせ。多人数同時通話DECTインカム。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --dark: #141414; --red: #c8102e; --red-dark: #9e0c24;
      --white: #ffffff; --gray-100: #f5f5f5; --gray-300: #d0d0d0;
      --gray-500: #888888; --gray-700: #444444;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--black); color: var(--white); line-height: 1.6; }

    #main-content { display: block; }

    /* ── NAV ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo img { height: 28px; width: auto; display: block; filter: invert(1); }
    .nav-back { color: var(--gray-300); text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
    .nav-back:hover { color: var(--white); }

    /* ── CONTENT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }
    main { padding: 140px 0 100px; }
    .article-date { font-size: 13px; color: var(--red); font-weight: 700; letter-spacing: 0.06em; margin-bottom: 12px; }
    .article-title { font-size: 32px; font-weight: 900; line-height: 1.4; margin-bottom: 40px; }
    .article-hero { width: 100%; border-radius: 6px; margin-bottom: 40px; display: block; }
    .article-body { font-size: 16px; color: var(--gray-100); }
    .article-body p { margin-bottom: 24px; }
    .article-gallery { margin-top: 48px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .article-gallery img { width: 100%; border-radius: 6px; display: block; }
    .article-back { margin-top: 60px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); }
    .article-back a { color: var(--white); border: 1px solid rgba(255,255,255,0.3); padding: 12px 32px; border-radius: 4px; text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.2s; display: inline-block; }
    .article-back a:hover { background: var(--white); color: var(--black); }

    /* ── LIST (id無しアクセス時) ── */
    .list-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .list-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 50px; }
    .news-item { display: flex; gap: 24px; align-items: center; padding: 24px 0; border-top: 1px solid rgba(255,255,255,0.1); text-decoration: none; transition: opacity 0.2s; }
    .news-item:last-child { border-bottom: 1px solid rgba(255,255,255,0.1); }
    .news-item:hover { opacity: 0.7; }
    .news-thumb { width: 160px; height: 100px; flex-shrink: 0; object-fit: cover; border-radius: 4px; background: var(--dark); }
    .news-body { flex: 1; min-width: 0; }
    .news-date { font-size: 12px; color: var(--red); font-weight: 700; letter-spacing: 0.06em; margin-bottom: 6px; }
    .news-title { font-size: 17px; font-weight: 700; color: var(--white); line-height: 1.4; }
    .news-arrow { color: var(--gray-300); font-size: 20px; flex-shrink: 0; }
    .msg { color: var(--gray-300); padding: 40px 0; }

    @media (max-width: 640px) {
      .article-title, .list-title { font-size: 24px; }
      .article-gallery { grid-template-columns: 1fr; }
      .news-thumb { width: 100px; height: 70px; }
      .news-title { font-size: 14px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.SQUARE_SUPABASE_URL = 'https://adatzeolzkjujtuxebrc.supabase.co';
    window.SQUARE_SUPABASE_KEY = 'sb_publishable_2Ghe-V3dLS7Ym06p71i33A_zFU8eJgz';
  </script>
</head>
<body>

<div id="main-content">
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="square_logo__1_.png" alt="square"></a>
      <a href="index.html" class="nav-back">&lsaquo; トップへ戻る</a>
    </div>
  </nav>

  <main>
    <div class="container" id="content">
      <p class="msg">読み込み中...</p>
    </div>
  </main>
</div>

<script>
  // ── ページ表示時に記事を読み込む ──
  loadContent();

  // ── 記事表示ロジック ──
  function loadContent() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    var sb = window.supabase.createClient(window.SQUARE_SUPABASE_URL, window.SQUARE_SUPABASE_KEY);

    if (id) {
      sb.from('news').select('*').eq('id', id).maybeSingle()
        .then(function(res) {
          if (res.error) { throw res.error; }
          renderArticle(res.data ? [res.data] : [], id);
        })
        .catch(function() {
          document.getElementById('content').innerHTML =
            '<p class="msg">お知らせを読み込めませんでした。</p>';
        });
    } else {
      sb.from('news').select('id,date,title,thumb').order('date', { ascending: false })
        .then(function(res) {
          if (res.error) { throw res.error; }
          renderList(res.data || []);
        })
        .catch(function() {
          document.getElementById('content').innerHTML =
            '<p class="msg">お知らせを読み込めませんでした。</p>';
        });
    }
  }

  function renderArticle(articles, id) {
    var a = articles.filter(function(x) { return x.id === id; })[0];
    var el = document.getElementById('content');
    if (!a) {
      el.innerHTML = '<p class="msg">記事が見つかりませんでした。</p>'
        + '<div class="article-back"><a href="news.html">お知らせ一覧へ</a></div>';
      return;
    }
    document.getElementById('page-title').textContent = a.title + ' | square';
    var hero = a.thumb ? '<img class="article-hero" src="' + a.thumb + '" alt="">' : '';
    var bodyHtml = String(a.body).split('\n').filter(function(p){return p.trim();})
      .map(function(p) { return '<p>' + escapeHtml(p) + '</p>'; }).join('');
    var gallery = '';
    if (a.images && a.images.length) {
      gallery = '<div class="article-gallery">' + a.images.map(function(src) {
        return '<img src="' + src + '" alt="" loading="lazy">';
      }).join('') + '</div>';
    }
    el.innerHTML =
      '<div class="article-date">' + formatDate(a.date) + '</div>'
      + '<h1 class="article-title">' + escapeHtml(a.title) + '</h1>'
      + hero
      + '<div class="article-body">' + bodyHtml + '</div>'
      + gallery
      + '<div class="article-back"><a href="news.html">お知らせ一覧へ</a></div>';
  }

  function renderList(articles) {
    var el = document.getElementById('content');
    var head = '<h1 class="list-title">お知らせ・導入事例</h1>'
      + '<p class="list-sub">squareの導入事例や最新情報をお届けします。</p>';
    if (!articles.length) {
      el.innerHTML = head + '<p class="msg">現在お知らせはありません。</p>';
      return;
    }
    var items = articles.map(function(a) {
      var thumb = a.thumb
        ? '<img class="news-thumb" src="' + a.thumb + '" alt="" loading="lazy">'
        : '<div class="news-thumb"></div>';
      return '<a class="news-item" href="news.html?id=' + encodeURIComponent(a.id) + '">'
        + thumb
        + '<div class="news-body"><div class="news-date">' + formatDate(a.date) + '</div>'
        + '<div class="news-title">' + escapeHtml(a.title) + '</div></div>'
        + '<div class="news-arrow">&rsaquo;</div></a>';
    }).join('');
    el.innerHTML = head + items;
  }

  function formatDate(d) {
    var p = (d || '').split('-');
    return p.length === 3 ? p[0] + '.' + p[1] + '.' + p[2] : d;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
</script>

</body>
</html>
